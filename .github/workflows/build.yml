name: Build Artifact(GUI)

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [ gui ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gui
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: ${{ matrix.arch }}
      - run: flutter pub get
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          flutter config --enable-windows-desktop
          flutter build windows
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter config --enable-linux-desktop
          flutter build linux
      - name: Build (MacOS)
        if: runner.os == 'macOS'
        run: |
          flutter config --enable-macos-desktop
          flutter build macos
      - name: Upload
        uses: actions/upload-artifact@v3.1.2
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: |
            build/windows/x64/runner/Release
            build/linux/x64/runner/Release
            build/macos/x64/runner/Release
            build/macos/arm64/runner/Release